# 本地从源码构建镜像（开发/调试用）
# 生产环境请使用仓库根目录 docker-compose.yml 拉取 GHCR 镜像
#
#   cd docker
#   cp .env.example .env
#   docker compose up -d --build

services:
  grok-reg-tool:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: grok-reg-tool:latest
    container_name: grok-reg-tool
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-6657}:6657"
    environment:
      PORT: "6657"
      BIND_HOST: "0.0.0.0"
      STATIC_ROOT: "/app/out/renderer"
      DATA_DIR: "/data"
      PYTHON_PATH: "/usr/local/bin/python3"
      REGISTER_DIR: "/app/register"
      SSO_DIR: "/data/sso"
      MAIL_API_BASE: "${MAIL_API_BASE:-}"
      MAIL_ADMIN_AUTH: "${MAIL_ADMIN_AUTH:-}"
      MAIL_DOMAIN: "${MAIL_DOMAIN:-}"
      RUN_COUNT: "${RUN_COUNT:-10}"
      HTTP_PROXY: "${HTTP_PROXY:-}"
      BROWSER_PROXY: "${BROWSER_PROXY:-}"
      BROWSER_PATH: "/usr/bin/chromium"
      COOKIE_SECURE: "${COOKIE_SECURE:-}"
      DISPLAY: ":99"
    volumes:
      - ./data:/data
    shm_size: "1gb"
