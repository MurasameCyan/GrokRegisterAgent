name: Docker Turnstile Solver multi-arch

on:
  push:
    branches: [beta]
    tags: ["v*"]
    paths:
      - "docker/turnstile-solver/**"
      - ".github/workflows/docker-turnstile-solver.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # GHCR 镜像名必须全小写；owner 若含大写会触发 metadata-action Unicorn HTML 错误
      - name: Image name (lowercase)
        id: image
        run: |
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "name=${owner}/grok-turnstile-solver" >> "$GITHUB_OUTPUT"
          echo "full=${{ env.REGISTRY }}/${owner}/grok-turnstile-solver" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.full }}
          tags: |
            type=raw,value=beta,enable=${{ github.ref == 'refs/heads/beta' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/beta' }}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Build and push (linux/amd64 + linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: ./docker/turnstile-solver
          file: ./docker/turnstile-solver/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=turnstile-solver
          cache-to: type=gha,mode=max,scope=turnstile-solver
