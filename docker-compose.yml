services:
  grok-register-agent:
    image: ghcr.io/murasamecyan/grokregisteragent:beta
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: grok-register-agent
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-6657}:6657"
    environment:
      PORT: "6657"
      BIND_HOST: "0.0.0.0"
      STATIC_ROOT: "/app/out/renderer"
      DATA_DIR: "/data"
      PYTHON_PATH: "/usr/local/bin/python3"
      REGISTER_DIR: "/app/register"
      REGISTER_HOST_SRC: "/opt/register-host"
      REGISTER_SEED: "/opt/register-seed"
      SSO_DIR: "/data/sso"
      MAIL_API_BASE: "${MAIL_API_BASE:-}"
      MAIL_ADMIN_AUTH: "${MAIL_ADMIN_AUTH:-}"
      MAIL_DOMAIN: "${MAIL_DOMAIN:-}"
      RUN_COUNT: "${RUN_COUNT:-10}"
      HTTP_PROXY: "${HTTP_PROXY:-}"
      BROWSER_PROXY: "${BROWSER_PROXY:-}"
      BROWSER_PATH: "/usr/bin/chromium"
      COOKIE_SECURE: "${COOKIE_SECURE:-}"
      DISPLAY: ":99"
    volumes:
      - ./data:/data
      - ./register:/opt/register-host:ro
    shm_size: "1gb"
