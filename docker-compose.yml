# 生产：只拉取 GHCR 镜像（无本地 build）
# 本地从源码构建请用：docker/docker-compose.yml
#
#   cp .env.example .env
#   docker compose pull
#   docker compose up -d
# 可选 Solver：
#   docker compose --profile solver pull
#   docker compose --profile solver up -d
#
# 默认拉本仓库 owner 的 GHCR（fork 友好）。覆盖示例：
#   GROK_IMAGE=ghcr.io/murasamecyan/grokregisteragent:beta
#   SOLVER_IMAGE=ghcr.io/murasamecyan/grok-turnstile-solver:beta

services:
  grok-register-agent:
    image: ${GROK_IMAGE:-ghcr.io/hkxiaoyao/grokregisteragent:beta}
    container_name: grok-register-agent
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-6657}:6657"
    environment:
      PORT: "6657"
      BIND_HOST: "0.0.0.0"
      STATIC_ROOT: "/app/out/renderer"
      DATA_DIR: "/data"
      PYTHON_PATH: "/usr/local/bin/python3"
      REGISTER_DIR: "/app/register"
      REGISTER_HOST_SRC: "/opt/register-host"
      REGISTER_SEED: "/opt/register-seed"
      SSO_DIR: "/data/sso"
      MAIL_API_BASE: "${MAIL_API_BASE:-}"
      MAIL_ADMIN_AUTH: "${MAIL_ADMIN_AUTH:-}"
      MAIL_DOMAIN: "${MAIL_DOMAIN:-}"
      RUN_COUNT: "${RUN_COUNT:-10}"
      HTTP_PROXY: "${HTTP_PROXY:-}"
      BROWSER_PROXY: "${BROWSER_PROXY:-}"
      BROWSER_PATH: "/usr/bin/chromium"
      COOKIE_SECURE: "${COOKIE_SECURE:-}"
      DISPLAY: ":99"
      # 可选外置 Turnstile Solver（compose --profile solver 时建议打开）
      TURNSTILE_SOLVER_ENABLED: "${TURNSTILE_SOLVER_ENABLED:-0}"
      TURNSTILE_SOLVER_URL: "${TURNSTILE_SOLVER_URL:-http://turnstile-solver:5072}"
      YESCAPTCHA_KEY: "${YESCAPTCHA_KEY:-}"
    volumes:
      - ./data:/data
      - ./register:/opt/register-host:ro
    shm_size: "1gb"

  # 可选：Turnstile Solver（默认不拉取/不启动）
  # 启用：docker compose --profile solver up -d
  # multi-arch amd64/arm64；ARM 可跑，通过率通常仍低于 x86
  turnstile-solver:
    profiles: ["solver"]
    image: ${SOLVER_IMAGE:-ghcr.io/hkxiaoyao/grok-turnstile-solver:beta}
    container_name: grok-turnstile-solver
    restart: unless-stopped
    # 仅内部网络；调试可映射 5072
    # ports:
    #   - "5072:5072"
    expose:
      - "5072"
    environment:
      HOST: "0.0.0.0"
      PORT: "5072"
      THREAD: "${TURNSTILE_SOLVER_THREADS:-2}"
      BROWSER_TYPE: "${TURNSTILE_SOLVER_BROWSER:-chromium}"
      DEBUG: "${TURNSTILE_SOLVER_DEBUG:-0}"
      PROXY: "${TURNSTILE_SOLVER_PROXY:-0}"
      DISPLAY: ":99"
    shm_size: "1gb"
