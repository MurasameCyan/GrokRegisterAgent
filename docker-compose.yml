# 使用 GitHub Container Registry 预构建多架构镜像（linux/amd64 + linux/arm64）
# 镜像：ghcr.io/murasamecyan/grokregisteragent:latest
#
# 快速启动：
#   cp .env.example .env
#   docker compose up -d
#   docker logs -f grok-reg-tool

services:
  grok-gegister-agent:
    image: ghcr.io/murasamecyan/grokregisteragent:latest
    container_name: grok-gegister-agent
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-6657}:6657"
    environment:
      PORT: "6657"
      BIND_HOST: "0.0.0.0"
      STATIC_ROOT: "/app/out/renderer"
      DATA_DIR: "/data"
      PYTHON_PATH: "/usr/local/bin/python3"
      REGISTER_DIR: "/app/register"
      SSO_DIR: "/data/sso"
      MAIL_API_BASE: "${MAIL_API_BASE:-}"
      MAIL_ADMIN_AUTH: "${MAIL_ADMIN_AUTH:-}"
      MAIL_DOMAIN: "${MAIL_DOMAIN:-}"
      RUN_COUNT: "${RUN_COUNT:-10}"
      HTTP_PROXY: "${HTTP_PROXY:-}"
      BROWSER_PROXY: "${BROWSER_PROXY:-}"
      BROWSER_PATH: "/usr/bin/chromium"
      COOKIE_SECURE: "${COOKIE_SECURE:-}"
      DISPLAY: ":99"
    volumes:
      # 仅挂数据目录。不要挂空的 ./register 覆盖 /app/register，
      # 否则会盖掉镜像内置脚本，报「未找到内置注册脚本目录 register/」。
      # 若需热更新 Python 脚本，请把完整 register 源码放到主机后取消下一行注释：
      # - ./register:/app/register
      - ./data:/data
    shm_size: "1gb"
